# Nginx configuration for Log Viewer
# Site: logs.storytimeapp.me
#
# Prerequisites:
#   sudo apt install fcgiwrap
#   sudo systemctl enable fcgiwrap
#   sudo systemctl start fcgiwrap

server {
    listen 80;
    server_name logs.storytimeapp.me;

    # Root directory for the log viewer
    root /home/ubuntu/storytime/logging;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ =404;
    }

    # CGI configuration using fcgiwrap
    location /cgi-bin/ {
        alias /home/ubuntu/storytime/logging/;

        location ~ \.py$ {
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }
}
